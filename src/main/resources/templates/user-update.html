<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit</title>
</head>
<body>
<h1>Chỉnh sửa thông tin của <span style="color:blue" th:text="${dto.getName()}"></span> có id = <span style="color:blue" th:text="${valueID}"></span></h1>

<form action="/user/update" method="post">


    <div>
        <input type="hidden" name="id" th:value="${valueID}">
    </div>


    <div>
        <label>Nhập tên <span style="color:blue">tối thiểu 6 ký tự và không dấu</span>:</label>
        <input type="text" name="name" placeholder="Nhập tên" th:value="${dto.getName()}">
    </div>

    <br>
    <div>
        <label>Nhập ngày sinh <span style="color:blue">(yy-MM-dddd)</span>:</label>
        <input type="text" name="birthday" placeholder="Nhập ngày sinh" th:value="${dto.getBirthday()}">
    </div>

    <br>
    <div>
        <label>Nhập giới tính <span style="color:blue">(MALE/FEMALE)</span>:</label>
        <input type="text" name="gender" placeholder="Nhập giới tính" th:value="${dto.getGender()}">
    </div>
    <br>
    <div>
        <label>Nhập địa chỉ:</label>
        <input type="text" name="address" placeholder="Nhập địa chỉ" th:value="${dto.getAddress()}">
    </div>
    <br>
    <div>
        <label>Nhập tên đăng nhập:</label>
        <input type="text" name="username" placeholder="Nhập tên đăng nhập " th:value="${dto.getUsername()}">
    </div>
    <br>
<!--    <div>-->
<!--        <label>Nhập mật khẩu:</label>-->
<!--        <input type="text" name="password" placeholder="Nhập mật khẩu " th:value="${dto.getPassword}">-->
<!--    </div>-->
<!--    <br>-->
    <button type="submit">SỬA THÔNG TIN</button>

</form>

<br>
<a href="/user"><button>Quay lại Danh sách người dùng</button></a>

</body>
</html>
