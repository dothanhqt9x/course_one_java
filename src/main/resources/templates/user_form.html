<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${user.id} != null ? 'Edit User' : 'Thêm mới User'">Form User</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<h1 th:text="${user.id} != null ? 'Chỉnh sửa User' : 'Thêm mới User'">Form User</h1>

<form th:action="@{/users/save}" th:object="${user}" method="post">
    <input type="hidden" th:if="${user.id != null}" th:field="*{id}"/>

    <div>
        <label for="name">Name:</label>
        <input type="text" id="name" th:field="*{name}" placeholder="Nhập tên (>=6 ký tự, không ký tự đặc biệt)"/>
        <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red"></div>
    </div>

    <div>
        <label for="gender">Gender:</label>
        <select id="gender" th:field="*{gender}">
            <option value="" th:text="${null}">--Chọn--</option>
            <option th:each="g : ${genders}"
                    th:value="${g}"
                    th:text="${g}">MALE</option>
        </select>
        <div th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}" style="color:red"></div>
    </div>

    <div>
        <label for="birthdate">Birthdate:</label>
        <input type="date" id="birthdate" th:field="*{birthdate}"/>
        <div th:if="${#fields.hasErrors('birthdate')}" th:errors="*{birthdate}" style="color:red"></div>
    </div>

    <div>
        <label for="address">Address:</label>
        <input type="text" id="address" th:field="*{address}" placeholder="Nhập address"/>
        <div th:if="${#fields.hasErrors('address')}" th:errors="*{address}" style="color:red"></div>
    </div>

    <div>
        <button type="submit">Save</button>
        <a th:href="@{/users}">Cancel</a>
    </div>
</form>

</body>
</html>
