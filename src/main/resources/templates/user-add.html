<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thêm người dùng</title>
</head>
<body>

<a href="/logout"><button style="color: red">ĐĂNG XUẤT</button></a>

<h1>Thêm người dùng</h1>

<form action="/user/add" method="post">
   <div>
       <label>Nhập tên <span style="color:blue">(tối thiểu 6 ký tự và không dấu)</span>:</label>
       <input type="text" name="name" placeholder="Nhập tên">
   </div>
    <br>
    <div>
        <label>Nhập giới tính <span style="color:blue">(MALE/FEMALE)</span>:</label>
        <input type="text" name="gender" placeholder="Nhập giới tính">
    </div>
    <br>
    <div>
        <label>Nhập ngày sinh <span style="color:blue">(Định dạng dd-MM-YYYY)</span>:</label>
        <input type="text" name="birthday" placeholder="Nhập ngày sinh">
    </div>
    <br>
    <div>
        <label>Nhập địa chỉ:</label>
        <input type="text" name="address" placeholder="Nhập địa chỉ ">
    </div>
    <br>
    <div>
        <label>Nhập tên đăng nhập:</label>
        <input type="text" name="username" placeholder="Nhập tên đăng nhập ">
    </div>
    <br>
    <div>
        <label>Nhập mật khẩu:</label>
        <input type="password" name="password" placeholder="Nhập mật khẩu ">
    </div>
    <br>
    <div>
        <label>Nhập vai trò:</label>
        <input type="text" name="role" placeholder="Nhập vai trò ">
    </div>
    <br>
    <button type="submit">THÊM</button>
</form>
<br>
<a href="/user"><button>Quay lại Danh sách người dùng</button></a>

</body>
</html>
